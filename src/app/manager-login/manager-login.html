<h2>Manager Login</h2>

<form (ngSubmit)="login()">
  <input
    type="text"
    placeholder="Username"
    name="username"
    [(ngModel)]="username">

  <input
    type="password"
    placeholder="Password"
    name="password"
    [(ngModel)]="password">

  <button type="submit">Login</button>
</form>
