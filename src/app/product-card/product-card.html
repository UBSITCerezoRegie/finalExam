<div class="product-card">

  <img
    [src]="product()?.image"
    [alt]="product()?.name"
    class="product-image">

  <h3>{{ product()?.name }}</h3>

  <p class="description">
    {{ product()?.description }}
  </p>

  <p class="price">
    ₱{{ product()?.price }}
  </p>

  <button (click)="addToCart()">
    Add to Cart
  </button>

</div>
