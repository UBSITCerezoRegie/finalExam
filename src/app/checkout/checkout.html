
<form
  [formGroup]="checkoutForm"
  (ngSubmit)="placeOrder()">
  <h2>Checkout</h2>


  <label>Customer Name</label>
  <input
    type="text"
    formControlName="customerName">

  <label>Contact Number</label>
  <input
    type="text"
    formControlName="contactNumber">

  <p>
    Total: ₱{{ cartService.totalPrice() }}
  </p>

  <button type="submit">
    Place Order
  </button>

</form>
